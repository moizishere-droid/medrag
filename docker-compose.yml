version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=medrag
      - POSTGRES_USER=medrag
      - POSTGRES_PASSWORD=medrag
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
